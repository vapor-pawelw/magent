name: Release

on:
  push:
    tags:
      - 'v*'

env:
  RELEASE_REPO: vapor-pawelw/magent-releases

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install tmux
        run: brew install tmux

      - name: Install toolchain
        run: mise install

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version $TAG"

      - name: Inject version into Project.swift
        run: |
          sed -i '' 's/"CFBundleShortVersionString": "1.0"/"CFBundleShortVersionString": "${{ steps.version.outputs.version }}"/' Project.swift
          sed -i '' 's/"CFBundleVersion": "1"/"CFBundleVersion": "${{ github.run_number }}"/' Project.swift
          echo "Project.swift after version injection:"
          grep -A1 CFBundle Project.swift

      - name: Install dependencies
        run: mise x -- tuist install

      - name: Build GhosttyKit.xcframework
        run: mise x -- ./scripts/bootstrap-ghosttykit.sh

      - name: Generate Xcode project
        run: mise x -- tuist generate --no-open

      - name: Build
        run: |
          xcodebuild build \
            -workspace Magent.xcworkspace \
            -scheme Magent \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="-"

      - name: Upload dSYMs to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload --org vapor-pawelw --project magent build/

      - name: Package app
        run: |
          APP_PATH=$(find build -name "Magent.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          STAGING_DIR=$(mktemp -d)
          trap 'rm -rf "$STAGING_DIR"' EXIT
          ditto "$APP_PATH" "$STAGING_DIR/Magent.app"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create -volname "Magent" -srcfolder "$STAGING_DIR" -ov -format UDZO Magent.dmg
          ditto -c -k --keepParent "$APP_PATH" Magent.zip

      - name: Read release notes from tag annotation
        id: release_notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES="$(git for-each-ref "refs/tags/${TAG}" --format='%(contents)')"
          if [ -z "$NOTES" ]; then
            echo "No tag annotation found for ${TAG}; will use generated release notes."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_notes=true" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (from changelog)
        if: steps.release_notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          target_commitish: main
          files: |
            Magent.dmg
            Magent.zip
          body: ${{ steps.release_notes.outputs.body }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Create GitHub Release (generated fallback)
        if: steps.release_notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          target_commitish: main
          files: |
            Magent.dmg
            Magent.zip
          generate_release_notes: true
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  update-cask:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 10

      - name: Get release info
        id: release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          ASSET_URL="https://github.com/${{ env.RELEASE_REPO }}/releases/download/${TAG}/Magent.dmg"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"

      - name: Download public release asset and compute SHA256
        id: sha
        run: |
          curl -sSL "${{ steps.release.outputs.asset_url }}" -o Magent.dmg

          SHA=$(sha256sum Magent.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Checkout homebrew-magent
        uses: actions/checkout@v4
        with:
          repository: vapor-pawelw/homebrew-magent
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-magent

      - name: Update cask formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          ASSET_URL="${{ steps.release.outputs.asset_url }}"
          sed -i "s/version \".*\"/version \"$VERSION\"/" homebrew-magent/Casks/magent.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" homebrew-magent/Casks/magent.rb
          sed -i "s|url \".*\".*|url \"$ASSET_URL\"|" homebrew-magent/Casks/magent.rb
          cat homebrew-magent/Casks/magent.rb

      - name: Commit and push cask update
        working-directory: homebrew-magent
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/magent.rb
          git commit -m "Update magent to ${{ steps.release.outputs.version }}"
          git push
