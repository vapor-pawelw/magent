name: Release

on:
  push:
    tags:
      - 'v*'

env:
  RELEASE_REPO: vapor-pawelw/mAgent

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install tmux
        run: brew install tmux

      - name: Install toolchain
        run: mise install

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version $TAG"

      - name: Inject version into Project.swift
        run: |
          sed -i '' 's/"CFBundleShortVersionString": "1.0"/"CFBundleShortVersionString": "${{ steps.version.outputs.version }}"/' Project.swift
          sed -i '' 's/"CFBundleVersion": "1"/"CFBundleVersion": "${{ github.run_number }}"/' Project.swift
          echo "Project.swift after version injection:"
          grep -A1 CFBundle Project.swift

      - name: Install dependencies
        run: mise x -- tuist install

      - name: Build GhosttyKit.xcframework
        run: mise x -- ./scripts/bootstrap-ghosttykit.sh

      - name: Generate Xcode project
        run: mise x -- tuist generate --no-open

      - name: Build
        run: |
          xcodebuild build \
            -workspace Magent.xcworkspace \
            -scheme Magent \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="-"

      - name: Upload dSYMs to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload --org vapor-pawelw --project magent build/

      - name: Package app
        run: |
          APP_PATH=$(find build -name "Magent.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          STAGING_DIR=$(mktemp -d)
          trap 'rm -rf "$STAGING_DIR"' EXIT
          ditto "$APP_PATH" "$STAGING_DIR/Magent.app"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create -volname "Magent" -srcfolder "$STAGING_DIR" -ov -format UDZO Magent.dmg
          ditto -c -k --keepParent "$APP_PATH" Magent.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          NOTES_FILE=$(mktemp)
          trap 'rm -f "$NOTES_FILE"' EXIT
          HAS_NOTES=false

          # Preferred source: exact version section from CHANGELOG.md.
          if [ -f CHANGELOG.md ]; then
            if awk -v version="$VERSION" '
              BEGIN { in_version = 0; found = 0 }
              $0 ~ ("^## " version " - ") {
                in_version = 1
                found = 1
                print
                next
              }
              /^## / {
                if (in_version == 1) {
                  exit
                }
              }
              in_version == 1 {
                print
              }
              END {
                if (found == 0) {
                  exit 2
                }
              }
            ' CHANGELOG.md > "$NOTES_FILE"; then
              if [ -s "$NOTES_FILE" ]; then
                HAS_NOTES=true
              fi
            else
              # Clear partial output if the section is missing.
              : > "$NOTES_FILE"
            fi
          fi

          # Fallback: tag annotation only when this is a real annotated tag.
          if [ "$HAS_NOTES" != "true" ]; then
            TAG_OBJECT_TYPE="$(git cat-file -t "refs/tags/${TAG}" 2>/dev/null || true)"
            if [ "$TAG_OBJECT_TYPE" = "tag" ]; then
              git for-each-ref "refs/tags/${TAG}" --format='%(contents)' > "$NOTES_FILE"
              if [ -s "$NOTES_FILE" ]; then
                HAS_NOTES=true
              fi
            fi
          fi

          if gh release view "$TAG" --repo "$RELEASE_REPO" > /dev/null 2>&1; then
            # Release already exists — update notes and upload assets
            if [ "$HAS_NOTES" = "true" ]; then
              gh release edit "$TAG" --repo "$RELEASE_REPO" --notes-file "$NOTES_FILE"
            fi
            gh release upload "$TAG" --repo "$RELEASE_REPO" --clobber Magent.dmg Magent.zip
          elif [ "$HAS_NOTES" = "true" ]; then
            gh release create "$TAG" \
              --repo "$RELEASE_REPO" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              Magent.dmg Magent.zip
          else
            gh release create "$TAG" \
              --repo "$RELEASE_REPO" \
              --title "$TAG" \
              --generate-notes \
              Magent.dmg Magent.zip
          fi

  update-cask:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 10

      - name: Get release info
        id: release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          ASSET_URL="https://github.com/${{ env.RELEASE_REPO }}/releases/download/${TAG}/Magent.dmg"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"

      - name: Download public release asset and compute SHA256
        id: sha
        run: |
          curl -sSL "${{ steps.release.outputs.asset_url }}" -o Magent.dmg

          SHA=$(sha256sum Magent.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: vapor-pawelw/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          ASSET_URL="${{ steps.release.outputs.asset_url }}"
          sed -i "s/version \".*\"/version \"$VERSION\"/" homebrew-tap/Casks/magent.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" homebrew-tap/Casks/magent.rb
          sed -i "s|url \".*\".*|url \"$ASSET_URL\"|" homebrew-tap/Casks/magent.rb
          cat homebrew-tap/Casks/magent.rb

      - name: Commit and push cask update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/magent.rb
          git commit -m "Update magent to ${{ steps.release.outputs.version }}"
          git push
