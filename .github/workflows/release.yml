name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install tmux
        run: brew install tmux

      - name: Install toolchain
        run: mise install

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version $TAG"

      - name: Inject version into Project.swift
        run: |
          sed -i '' 's/"CFBundleShortVersionString": "1.0"/"CFBundleShortVersionString": "${{ steps.version.outputs.version }}"/' Project.swift
          sed -i '' 's/"CFBundleVersion": "1"/"CFBundleVersion": "${{ github.run_number }}"/' Project.swift
          echo "Project.swift after version injection:"
          grep -A1 CFBundle Project.swift

      - name: Install dependencies
        run: mise x -- tuist install

      - name: Build GhosttyKit.xcframework
        run: mise x -- ./scripts/bootstrap-ghosttykit.sh

      - name: Generate Xcode project
        run: mise x -- tuist generate --no-open

      - name: Build
        run: |
          xcodebuild build \
            -workspace Magent.xcworkspace \
            -scheme Magent \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="-"

      - name: Upload dSYMs to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload --org vapor-pawelw --project magent build/

      - name: Package app
        run: |
          APP_PATH=$(find build -name "Magent.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" Magent.zip

      - name: Read release notes from tag annotation
        id: release_notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES="$(git for-each-ref "refs/tags/${TAG}" --format='%(contents)')"
          if [ -z "$NOTES" ]; then
            echo "No tag annotation found for ${TAG}; will use generated release notes."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_notes=true" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (from changelog)
        if: steps.release_notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: Magent.zip
          body: ${{ steps.release_notes.outputs.body }}

      - name: Create GitHub Release (generated fallback)
        if: steps.release_notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: Magent.zip
          generate_release_notes: true

  update-cask:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 10

      - name: Get release info
        id: release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve Magent.zip asset API URL
        id: asset
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF.replace("refs/tags/", "");
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const asset = release.assets.find((candidate) => candidate.name === "Magent.zip");
            if (!asset) {
              core.setFailed(`Magent.zip not found for ${tag}`);
              return;
            }

            core.setOutput("api_url", asset.url);

      - name: Download private release asset and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sSL \
            -H "Accept: application/octet-stream" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${{ steps.asset.outputs.api_url }}" \
            -o Magent.zip

          SHA=$(sha256sum Magent.zip | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Checkout homebrew-magent
        uses: actions/checkout@v4
        with:
          repository: vapor-pawelw/homebrew-magent
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-magent

      - name: Update cask formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          ASSET_API_URL="${{ steps.asset.outputs.api_url }}"
          sed -i "s/version \".*\"/version \"$VERSION\"/" homebrew-magent/Casks/magent.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" homebrew-magent/Casks/magent.rb
          sed -i "s|url \".*\".*|url \"$ASSET_API_URL\", using: GitHubPrivateRepositoryReleaseAssetDownloadStrategy|" homebrew-magent/Casks/magent.rb
          cat homebrew-magent/Casks/magent.rb

      - name: Commit and push cask update
        working-directory: homebrew-magent
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/magent.rb
          git commit -m "Update magent to ${{ steps.release.outputs.version }}"
          git push
